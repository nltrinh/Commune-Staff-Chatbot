<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — Trợ lý Số Cán bộ Xã</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Lexend:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f3f4f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-family: 'Lexend'; font-size: 24px; color: #1e3a8a; margin-bottom: 8px; }
        p { color: #6b7280; font-size: 14px; margin-bottom: 32px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #374151; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        .footer { margin-top: 24px; font-size: 14px; color: #6b7280; }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .error { color: #dc2626; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="background: #1e3a8a; width: 48px; height: 48px; border-radius: 12px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
        <h1>Đăng nhập</h1>
        <p>Hệ thống Trợ lý Hành chính Xã</p>
        
        <form id="login-form">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" required placeholder="Nhập username">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit">Đăng nhập</button>
            <div id="error-msg" class="error">Sai tên đăng nhập hoặc mật khẩu</div>
        </form>

        <div class="footer">
            Chưa có tài khoản? <a href="/register_ui">Đăng ký ngay</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            const res = await fetch('/login', {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('commune_token', data.access_token);
                window.location.href = '/';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        };
    </script>
</body>
</html>
